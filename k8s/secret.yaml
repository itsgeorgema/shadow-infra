# All sensitive values are base64-encoded.
# Generate with: echo -n "your-value" | base64
#
# Apply with: kubectl apply -f k8s/secret.yaml -n shadow-infra
apiVersion: v1
kind: Secret
metadata:
  name: shadow-infra-secrets
  namespace: shadow-infra
type: Opaque
data:
  SUPABASE_URL: <base64>
  SUPABASE_ANON_KEY: <base64>
  SUPABASE_SERVICE_KEY: <base64>
  ANTHROPIC_API_KEY: <base64>
  GITHUB_WEBHOOK_SECRET: <base64>
  GITHUB_TOKEN: <base64>
  PROD_URL: <base64>
